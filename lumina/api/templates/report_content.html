<div class="flex flex-col gap-4">
  {% if empty %}
  <div class="flex-1 flex items-center justify-center rounded-2xl border border-dashed border-zinc-200 dark:border-zinc-800 bg-zinc-50 dark:bg-zinc-900/30 text-sm text-zinc-500 py-16">
    暂无{{ {"daily": "日报", "weekly": "周报", "monthly": "月报"}[report_type] }}
  </div>
  {% else %}
  <div class="flex flex-col gap-3 md:flex-row md:items-center md:justify-between">
    {% if date_header %}
    <div class="text-xs font-bold text-indigo-500">
      {{ date_header }}
    </div>
    {% endif %}
    <label class="flex items-center gap-3 text-xs font-bold text-zinc-500 uppercase tracking-wider">
      <span>选择日期</span>
      <select
        name="key"
        class="min-w-[180px] rounded-xl border border-zinc-200 dark:border-zinc-700 bg-white dark:bg-zinc-900 px-3 py-2 text-sm font-semibold text-zinc-700 dark:text-zinc-200 outline-none"
        hx-get="/fragments/report/{{ report_type }}"
        hx-trigger="change"
        hx-target="#digest-content"
        hx-swap="innerHTML"
        hx-indicator="#digest-loading"
      >
        {% for item in report_options %}
        <option value="{{ item.key }}" {% if item.key == selected_key %}selected{% endif %}>{{ item.label }}</option>
        {% endfor %}
      </select>
    </label>
  </div>
  <div class="text-sm text-zinc-600 dark:text-zinc-400 leading-relaxed prose dark:prose-invert prose-sm max-w-none">
    {{ html_content | safe }}
  </div>
  {% endif %}
</div>
